<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Směnářek ® - Záchranná Verze</title>
  <style>
    :root{--bg:#0c1d33;--panel:#122e52;--ink:#eaf2ff;--muted:#a9c3e6;--accent:#6cc0ff;--sel:#1e78d799;--good:#5bd39a;--goodtext:#9ff3cd;--field:#0b213d;--border:#1f3f66}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto}
    *{box-sizing:border-box}
    .wrap{max-width:1200px;margin:0 auto;padding:1rem}
    .card{background:var(--panel);border-radius:18px;padding:1rem;margin-bottom:1rem}
    .calendar{width:100%;border-collapse:collapse}
    .calendar td{height:80px;border:1px solid rgba(255,255,255,0.1);position:relative;text-align:center}
    .result{margin-top:.6rem;padding:.7rem;border-radius:12px;background:rgba(91,211,154,0.12);color:#9ff3cd;font-weight:700}
    .payline{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid rgba(255,255,255,0.08)}
    input{width:100%;padding:.6rem;border-radius:12px;border:1px solid var(--border);background:var(--field);color:var(--ink);margin-bottom:.5rem}
    .row{display:flex;gap:.5rem}
    .chip{padding:.4rem .8rem;border-radius:99px;background:var(--panel);border:1px solid var(--border);color:var(--ink);cursor:pointer}
    .D{background:rgba(108,192,255,0.2)} .N{background:rgba(255,188,104,0.2)} .V{background:rgba(119,214,139,0.2)}
  </style>
</head>
<body>
<div class="wrap">
  <header style="text-align:center;padding:1rem">
    <h1>Směnářek ®</h1>
    <div id="todayNameday" style="color:var(--goodtext)"></div>
  </header>

  <section class="card">
    <div class="row" style="justify-content:space-between;margin-bottom:1rem">
      <button class="chip" id="prev">&larr;</button>
      <h2 id="monthLabel" style="margin:0"></h2>
      <button class="chip" id="next">&rarr;</button>
    </div>
    <table id="cal" class="calendar"></table>
  </section>

  <aside class="card">
    <h3>Nastavení a Výplata</h3>
    <label>Základ (Kč/h)</label><input id="rate_base" type="number">
    <div class="row">
      <div style="flex:1"><label>Motivační bonus</label><input id="annual_bonus" type="number"></div>
      <div style="flex:1"><label>Prémie %</label><input id="bonus_pct" type="number"></div>
    </div>
    <label>Fond vedoucího</label><input id="fund_bonus_month" type="number">
    
    <hr>
    <div id="pay"></div>
    <div id="gross" class="result">Hrubá: 0,00 Kč</div>
    <div id="net" class="result">Čistá (odhad): 0,00 Kč</div>
    <div class="sig" style="text-align:center;margin-top:1rem;opacity:0.5">Hanuman & Gemini ®</div>
  </aside>
</div>

<script>
// Tady je záchranná logika
let current = new Date();
let state = JSON.parse(localStorage.getItem('smenarek_v1')) || { shifts: {}, rates: {rate_base:148.5}, annual_bonus:0, bonus_pct:10, monthFunds:{} };

function save() { localStorage.setItem('smenarek_v1', JSON.stringify(state)); }
function $(id) { return document.getElementById(id); }
function money(v) { return (v || 0).toLocaleString('cs-CZ') + ' Kč'; }

function render() {
  const y = current.getFullYear(), m = current.getMonth();
  $('monthLabel').textContent = new Intl.DateTimeFormat('cs-CZ', {month:'long', year:'numeric'}).format(current);
  
  let html = '<tr><th>Po</th><th>Út</th><th>St</th><th>Čt</th><th>Pá</th><th>So</th><th>Ne</th></tr><tr>';
  let firstDay = new Date(y, m, 1).getDay() || 7;
  let days = new Date(y, m + 1, 0).getDate();

  for(let i=1; i<firstDay; i++) html += '<td></td>';
  for(let i=1; i<=days; i++) {
    let dKey = `${y}-${m+1}-${i}`;
    let s = state.shifts[dKey] || '';
    html += `<td class="${s}" onclick="toggleShift('${dKey}')">${i}<br><b>${s}</b></td>`;
    if((i + firstDay - 1) % 7 === 0) html += '</tr><tr>';
  }
  $('cal').innerHTML = html + '</tr>';
  calc();
}

function toggleShift(key) {
  const codes = ['', 'D', 'N', 'R', 'V'];
  let cur = state.shifts[key] || '';
  state.shifts[key] = codes[(codes.indexOf(cur) + 1) % codes.length];
  save(); render();
}

function calc() {
  let h = 0;
  for(let k in state.shifts) {
    if(k.startsWith(`${current.getFullYear()}-${current.getMonth()+1}-`)) {
      if(['D','N','R'].includes(state.shifts[k])) h += 11.25;
    }
  }
  
  let base = nval($('rate_base').value) * h;
  let bonus = nval($('annual_bonus').value);
  let fund = nval($('fund_bonus_month').value);
  let gross = base + (base * (nval($('bonus_pct').value)/100)) + bonus + fund;
  
  $('gross').textContent = '💼 Hrubá mzda: ' + money(gross);
  $('net').textContent = '💵 Čistá (odhad): ' + money(gross * 0.78);
  
  let payRows = [['Základ', money(base)]];
  if(bonus > 0) payRows.push(['Motivační bonus', money(bonus)]);
  if(fund > 0) payRows.push(['Fond vedoucího', money(fund)]);
  
  $('pay').innerHTML = payRows.map(r => `<div class="payline"><span>${r[0]}</span><b>${r[1]}</b></div>`).join('');
}

function nval(v) { return parseFloat(v) || 0; }

$('prev').onclick = () => { current.setMonth(current.getMonth()-1); render(); };
$('next').onclick = () => { current.setMonth(current.getMonth()+1); render(); };
$('rate_base').oninput = (e) => { state.rates.rate_base = e.target.value; save(); calc(); };
$('annual_bonus').oninput = (e) => { state.annual_bonus = e.target.value; save(); calc(); };

// Prvotní načtení políček
$('rate_base').value = state.rates.rate_base;
$('annual_bonus').value = state.annual_bonus;

render();
</script>
</body>
</html>
