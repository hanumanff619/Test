<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Směnářek</title>
    <style>
        /* TADY JE TO CSS – Upraveno pro mobilní displeje, aby se nic neořezávalo */
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            max-width: 100%;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #bg-layer {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background-size: cover; background-position: center;
            opacity: 0.15; z-index: -1; transition: background 0.5s;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 1rem;
        }
        h1 { text-align: center; margin: 0.5rem 0; font-size: 1.8rem; }
        .header-info { text-align: center; margin-bottom: 1rem; color: #38bdf8; font-size: 1.1rem; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        button {
            background: #334155; color: #fff; border: 0; padding: 0.5rem 1rem;
            border-radius: 4px; cursor: pointer; font-size: 1rem;
        }
        button:hover { background: #475569; }
        .modes { display: flex; gap: 0.25rem; justify-content: center; margin-bottom: 1rem; }
        .modes button { padding: 0.35rem 0.75rem; font-size: 0.85rem; }
        
        /* Kalendář */
        table { width: 100%; border-collapse: collapse; background: rgba(30,41,59,0.7); border-radius: 8px; overflow: hidden; }
        th, td { width: 14.28%; text-align: center; padding: 0.5rem 0; position: relative; vertical-align: top; }
        th { background: #1e293b; color: #94a3b8; font-size: 0.85rem; font-weight: normal; }
        td { height: 65px; border: 1px solid #334155; cursor: pointer; transition: background 0.2s; }
        td:hover { background: rgba(51,65,85,0.5); }
        .daynum { font-size: 0.85rem; color: #64748b; margin-bottom: 2px; }
        td.today .daynum { color: #38bdf8; font-weight: bold; }
        td.selected { outline: 2px solid #38bdf8; z-index: 1; }
        
        .badge {
            display: inline-block; padding: 0.15rem 0.35rem; font-size: 0.8rem;
            font-weight: bold; border-radius: 4px; margin-top: 2px;
        }
        
        /* Barvičky směn */
        td.D .badge { background: #0284c7; color: #fff; }
        td.N .badge { background: #b45309; color: #fff; }
        td.R .badge { background: #16a34a; color: #fff; }
        td.O .badge { background: #ea580c; color: #fff; }
        td.F .badge { background: #dc2626; color: #fff; }
        td.FO .badge { background: #e11d48; color: #fff; }
        td.F16 .badge { background: #7c3aed; color: #fff; }
        td.V .badge { background: #475569; color: #fff; }

        td.D { background: rgba(2,132,199,0.1); }
        td.N { background: rgba(180,83,9,0.1); }
        td.R { background: rgba(22,163,74,0.1); }
        td.O { background: rgba(234,88,12,0.1); }
        td.F { background: rgba(220,38,38,0.1); }
        td.FO { background: rgba(225,29,72,0.1); }
        td.F16 { background: rgba(124,58,237,0.1); }
        td.V { background: rgba(71,85,105,0.1); }
        
        /* Panel výpočtů */
        .panel { background: rgba(30,41,59,0.8); padding: 1rem; border-radius: 8px; margin-top: 1rem; border: 1px solid #334155; }
        .panel h3 { margin-top: 0; margin-bottom: 0.75rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; font-size: 1.2rem; }
        .row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
        .row label { flex: 1; font-size: 0.9rem; color: #94a3b8; }
        .row input { width: 100px; background: #1e293b; color: #fff; border: 1px solid #475569; padding: 0.25rem 0.5rem; border-radius: 4px; text-align: right; }
        
        .payline { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 0.25rem; }
        .payline span:first-child { color: #94a3b8; }
        .total-box { font-size: 1.1rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #475569; }
        .net-box { color: #4ade80; font-weight: bold; font-size: 1.3rem; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <div class="container">
        <h1>Směnářek</h1>
        <div class="header-info">
            <div id="todayShift">Dnes: —</div>
            <div id="todayNameday">Svátek: —</div>
        </div>
        
        <div class="nav">
            <button id="prev">←</button>
            <span id="monthLabel" style="font-weight:bold; font-size:1.2rem;">—</span>
            <button id="next">→</button>
        </div>
        
        <div class="modes">
            <button id="mode12">12h Provoz</button>
            <button id="mode8">8h Osmičky</button>
            <button id="mode775">7.75h Režim</button>
        </div>
        
        <div class="nav" style="margin-bottom: 1rem;">
            <button id="setToday" style="flex:1; margin-right:0.5rem; background:#0284c7;">Zadat dnešní směnu</button>
            <button id="clearDay" style="background:#dc2626;">Smazat</button>
        </div>
        
        <table id="cal"></table>
        
        <div class="panel">
            <h3>📊 Statistiky měsíce</h3>
            <div id="stats" style="font-size:1rem; line-height:1.4;">—</div>
            <div id="substats" style="margin-top:0.5rem; display:none;"></div>
        </div>
        
        <div class="panel">
            <h3>⚙️ Hodinové sazby a prémiové složky</h3>
            <div class="row"><label>Základní hodinovka (Kč/h)</label><input id="rate_base" type="number" placeholder="148.50"></div>
            <div class="row"><label>Základ pro tento měsíc (Kč/h)</label><input id="rate_base_month" type="number" placeholder="Variabilní"></div>
            <div class="row"><label>Odpolední příplatek (Kč/h)</label><input id="rate_odpo" type="number" placeholder="10"></div>
            <div class="row"><label>Noční příplatek (Kč/h)</label><input id="rate_noc" type="number" placeholder="25"></div>
            <div class="row"><label>Víkendový příplatek (Kč/h)</label><input id="rate_vikend" type="number" placeholder="35"></div>
            <div class="row"><label>Nepřetržitý provoz (Kč/měsíc)</label><input id="rate_nepretrzity" type="number" placeholder="0"></div>
            <div class="row"><label>Výše prémií (%)</label><input id="bonus_pct" type="number" placeholder="10"></div>
            <div class="row"><label>Motivační / Mimořádný bonus</label><input id="annual_bonus" type="number" placeholder="0"></div>
            <div class="row"><label>Fond vedoucího na tento měsíc</label><input id="fund_bonus_month" type="number" placeholder="0"></div>
            <div class="row" style="margin:.5rem 0"><input id="caf_check" type="checkbox" style="width:auto"><label for="caf_check" style="margin:0; padding-left:0.5rem;">Cafeterie 1000 Kč</label></div>
            <div class="row" style="margin:.5rem 0"><input id="lunch_check" type="checkbox" style="width:auto"><label for="lunch_check" style="margin:0; padding-left:0.5rem;">Započítat obědy na ranní (režim 7.75)</label></div>
        </div>
        
        <div class="panel">
            <h3>💰 Průměrný výdělek na dovolenou / svátky</h3>
            <div class="row"><label>Průměr na hodinu (ručně z pásky)</label><input id="avg_manual" type="number" placeholder="Kč/h"></div>
            <div id="avg_info" style="font-size:0.85rem; color:#38bdf8; margin-top:0.25rem; text-align:right;">—</div>
            <div style="display:none;">
                <input id="avg_net1" type="number"><input id="avg_h1" type="number">
                <input id="avg_net2" type="number"><input id="avg_h2" type="number">
                <input id="avg_net3" type="number"><input id="avg_h3" type="number">
            </div>
        </div>
        
        <div class="panel">
            <h3>🧮 Podrobný rozpis výplaty</h3>
            <div id="pay"></div>
            <div class="total-box" id="gross">💼 Hrubá mzda: —</div>
            <div class="net-box" id="net">💵 Čistá mzda (odhad): —</div>
            <div class="payline" style="margin-top:0.5rem;" id="cafInfo">🎁 Cafeterie (mimo čistou): <b>0,00 Kč</b></div>
            <div class="payline" id="meal">🍽️ Stravenky: —</div>
        </div>
        
        <div id="yearSummary"></div>
    </div>

    <script src="app_v181.js"></script>
</body>
</html>
