<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Směnářek - Madeta Edition</title>
  <meta name="theme-color" content="#102a4a">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <style>
    :root{
      --bg:#0c1d33; --panel:#122e52; --ink:#eaf2ff; --muted:#a9c3e6; --accent:#6cc0ff;
      --sel:#1e78d799; --good:#5bd39a; --goodtext:#9ff3cd; --field:#0b213d; --border:#1f3f66;
    }
    body.mode8{ --accent:#b38cff; --sel:#7b3ff299; }
    html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto}
    *{box-sizing:border-box}
    header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,rgba(12,29,51,.95),rgba(12,29,51,.7));backdrop-filter:blur(6px)}
    .head{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.7rem 1rem}
    .logo{font-size:2rem;line-height:1}
    h1{margin:.2rem 0 0 0;font-size:1.25rem}
    .todayBox{width:100%;max-width:1200px;padding:.4rem 1rem 0 1rem}
    .todayLine{color:var(--goodtext);font-weight:700}
    .wrap{max-width:1200px;margin:0 auto;padding:1rem}
    .grid{display:grid;grid-template-columns:1fr;gap:.9rem}
    @media(min-width:1100px){.grid{grid-template-columns:1.5fr 1fr}}
    .card{background:var(--panel);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.25);padding:1rem;position:relative}
    .calendar{width:100%;border-collapse:collapse}
    .calendar th,.calendar td{border:1px solid rgba(255,255,255,.08);padding:.35rem;vertical-align:top}
    .calendar th{color:var(--muted);font-weight:600;text-align:center;background:rgba(14,38,70,.45)}
    .calendar td{height:92px;position:relative;background:rgba(15,39,72,.26)}
    .calendar td.selected{background:var(--sel)!important;box-shadow:inset 0 0 0 2px #75c7ff99}
    .calendar td.today:not(.selected){box-shadow:inset 0 0 0 2px rgba(108,192,255,.75)}
    .daynum{position:absolute;top:.35rem;right:.35rem;color:var(--muted);font-size:.85rem}
    .badge{display:inline-block;margin-top:1.2rem;padding:.2rem .5rem;border-radius:8px;font-size:.85rem;background:rgba(0,0,0,0.3);font-weight:700}
    .D, .R {background:linear-gradient(180deg,rgba(108,192,255,.15),rgba(108,192,255,.10))}
    .N{background:linear-gradient(180deg,rgba(255,188,104,.15),rgba(255,188,104,.10))}
    .V{background:linear-gradient(180deg,rgba(119,214,139,.14),rgba(119,214,139,.10))}
    .O{background:linear-gradient(180deg,rgba(255,122,200,.15),rgba(255,122,200,.10))}
    .D .badge, .R .badge { color: #6cc0ff; border: 1px solid #6cc0ff; }
    .N .badge { color: #ffbc68; border: 1px solid #ffbc68; }
    .O .badge { color: #ff7ac8; border: 1px solid #ff7ac8; }
    .V .badge { color: #9ff3cd; border: 1px solid #9ff3cd; }
    .row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
    .chip{padding:.3rem .7rem;border:1px solid rgba(255,255,255,.12);border-radius:99px;background:transparent;color:var(--ink);cursor:pointer}
    label{display:block;margin:.45rem 0 .25rem}
    input[type="number"]{width:100%;padding:.6rem .7rem;border-radius:12px;border:1px solid var(--border);background:var(--field);color:var(--ink)}
    .payline{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid rgba(255,255,255,.08)}
    
    /* ✅ SJEDNOCENÁ PENĚŽNÍ ZELENÁ PRO VŠECHNY VÝSLEDKY */
    .result {
      margin-top:.6rem; padding:.7rem .9rem; border-radius:12px; 
      border:1px solid rgba(255,255,255,.12); 
      background:rgba(91,211,154,.12) !important; 
      color:#9ff3cd !important; font-weight:700;
    }
    
    .subtle{color:var(--muted);margin-top:.2rem}
    hr{border:none;height:1px;background:rgba(255,255,255,.1);margin:1rem 0}
    .sig{display:flex;justify-content:center;align-items:center;gap:.4rem;opacity:.9;font-size:1.05rem;margin-top:1.5rem}
  </style>
</head>
<body>
<header>
  <div class="head"><div class="logo">📆</div><h1>Směnářek</h1></div>
  <div class="todayBox"><div id="todayShift" class="todayLine">Dnes: —</div><div id="todayNameday" class="todayLine">Svátek: —</div></div>
</header>
<div class="wrap grid">
  <section class="card" id="card-calendar">
    <div id="bg-layer"></div>
    <div class="row" style="justify-content:space-between">
      <div class="row"><button class="chip" id="prev">&larr;</button><div id="monthLabel" class="chip"></div><button class="chip" id="next">&rarr;</button></div>
      <div class="row"><button class="chip" id="setToday">Dnes</button><button class="chip" id="clearDay">Smazat</button></div>
    </div>
    <table class="calendar" id="cal"></table>
    <div class="row" style="margin-top:.6rem"><button class="chip" id="mode12">12 h</button><button class="chip" id="mode8">8 h</button></div>
  </section>
  <aside class="card">
    <h3 style="margin-top:0">Statistiky</h3>
    <div id="stats"></div><div id="substats"></div><hr>
    <label>Základní hodinovka</label><input id="rate_base" type="number" step="0.01">
    <label>Základ měsíc</label><input id="rate_base_month" type="number" step="0.01">
    <div class="row"><input id="rate_odpo" type="number" placeholder="Odpol"><input id="rate_noc" type="number" placeholder="Noční"></div>
    <div class="row"><input id="rate_vikend" type="number" placeholder="Víkend"><input id="rate_nepretrzity" type="number" placeholder="Přesčas h"></div>
    <div class="row" style="margin:.5rem 0"><input id="caf_check" type="checkbox"><label for="caf_check">Cafeterie 1000 Kč</label></div>
    <div class="row"><input id="bonus_pct" type="number" placeholder="Prémie %"><input id="annual_bonus" type="number" placeholder="Motivační"></div>
    <label>Fond vedoucího</label><input id="fund_bonus_month" type="number">
    <hr>
    <div class="row"><input id="avg_net1" type="number" placeholder="Net M-1"><input id="avg_h1" type="number" placeholder="Hod M-1"></div>
    <div id="avg_info" class="subtle"></div>
    <div id="pay"></div>
    <div id="gross" class="result">💼 Hrubá mzda: 0,00 Kč</div>
    <div id="net" class="result">💵 Čistá mzda: 0,00 Kč</div>
    <div id="meal" class="result">🍽️ Stravenky: 0 ks</div>
    <div id="cafInfo" class="result">🎁 Cafeterie: 0,00 Kč</div>
    <hr>
    <button class="chip" id="toggleAudit">Audit</button><div id="audit" style="display:none"></div>
    <div id="yearSummary"></div>
    <div class="sig"><span style="color:#6cc0ff">Hanuman & Gemini</span></div>
  </aside>
</div>
<script src="app_v181.js" defer></script>
</body>
</html>
